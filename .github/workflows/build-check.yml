name: Build check

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.5.2
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 26
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run contact regression checks
        run: pnpm test:contact

      - name: Build standalone app
        run: pnpm build

      - name: Verify standalone artifact
        run: test -f .next/standalone/server.js

      - name: Build Docker image
        run: docker build --target runner -t cwb-website:ci .
